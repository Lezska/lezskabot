commands.sayo-roll.examples: |-
  /roll
  直接roll会在1-100之间随机一个数字并返回(类似osu的roll)

  /roll [数字]
  带指定的数字的话则会从1到这个数字之间随机roll一个数字

  /roll [x不x/x没x]
  例如 /roll 我是不是耳聋
  bot会在 我觉得你不是耳聋 和 我觉得你是耳聋 之间随机一个并返回。

  /roll [xxx还是xxx] ...
  例如 /roll 今晚刷pp还是摆烂
  bot会在 当然是今晚刷pp咯 和 当然是摆烂咯 之间随机一个并返回。只允许两个词

  /roll [参数] [参数] ...
  例如 /roll 吃饭 睡觉 打游戏 运动 点蚊香
  bot会在 吃饭 睡觉 打游戏 运动 点蚊香之间随机一个并返回。

  可以是无限多的词
  /roll xxx概率
  例如 /roll 我今晚刷到pp的概率
  只认参数结尾为 概率 这个词才可以触发，上面的例子会返回：
  你今晚刷到pp的概率为:0.01-100%
